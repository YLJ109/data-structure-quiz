<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
<title>考试刷题系统</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f8f9fc;--surface:rgba(255,255,255,.92);--surface2:#f1f3f9;--text:#1b1f3b;--text2:#6b7194;--text3:#9498b3;
  --border:#e2e5f1;--border2:#d0d4e4;
  --primary:#4f46e5;--primary-hover:#4338ca;--primary-light:#eef2ff;--primary-glow:rgba(79,70,229,.12);
  --accent:#7c3aed;--accent-light:#f5f3ff;
  --success:#059669;--success-light:#ecfdf5;--success-border:#a7f3d0;
  --error:#dc2626;--error-light:#fef2f2;--error-border:#fecaca;
  --warn:#d97706;--warn-light:#fffbeb;
  --code-bg:#f4f5fb;--code-border:#e5e7f0;
  --shadow-sm:0 1px 3px rgba(27,31,59,.04),0 1px 2px rgba(27,31,59,.06);
  --shadow:0 4px 16px rgba(27,31,59,.06),0 1px 4px rgba(27,31,59,.04);
  --shadow-lg:0 12px 40px rgba(27,31,59,.08),0 4px 12px rgba(27,31,59,.04);
  --shadow-glow:0 0 0 3px var(--primary-glow);
  --radius:12px;--radius-sm:8px;--radius-lg:16px;
  --transition:all .2s cubic-bezier(.4,0,.2,1);
  --card-bg:rgba(255,255,255,.8);--focus-bg:rgba(255,255,255,.7);--overlay:rgba(255,255,255,.4);
}
[data-theme="dark"]{
  --bg:#0c0e1a;--surface:rgba(21,24,41,.92);--surface2:#1c2038;--text:#e8eaf6;--text2:#8b90b0;--text3:#5c6082;
  --border:#262a42;--border2:#32365a;
  --primary:#818cf8;--primary-hover:#6366f1;--primary-light:#1e1b4b;--primary-glow:rgba(129,140,248,.15);
  --accent:#a78bfa;--accent-light:#1e1538;
  --success:#34d399;--success-light:#064e3b;--success-border:#065f46;
  --error:#f87171;--error-light:#450a0a;--error-border:#7f1d1d;
  --warn:#fbbf24;--warn-light:#451a03;
  --code-bg:#1a1d35;--code-border:#2a2e4e;
  --shadow-sm:0 1px 3px rgba(0,0,0,.2);--shadow:0 4px 16px rgba(0,0,0,.25);
  --shadow-lg:0 12px 40px rgba(0,0,0,.35);--shadow-glow:0 0 0 3px var(--primary-glow);
  --card-bg:rgba(21,24,41,.8);--focus-bg:rgba(21,24,41,.7);--overlay:rgba(12,14,26,.5);
}
html{scroll-behavior:smooth;overflow-x:hidden}
body{font-family:'Inter','Noto Sans SC',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.65;transition:color .35s;-webkit-font-smoothing:antialiased;min-height:100vh;position:relative}
/* Landing */
.landing{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px 20px;gap:5px}
.landing-title{text-align:center}
.landing-title h1{font-size:2rem;font-weight:800;letter-spacing:-.04em;margin-bottom:6px}
.landing-title p{color:var(--text2);font-size:.95rem}
.course-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:860px;width:100%}
@media(max-width:700px){.course-grid{grid-template-columns:1fr}}
.course-card{background:var(--card-bg);border:1.5px solid var(--border);border-radius:var(--radius-lg);padding:15px 20px;cursor:pointer;transition:var(--transition);text-align:center}
.course-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg);border-color:var(--primary)}
.course-card .icon-wrap{width:52px;height:52px;border-radius:50%;margin:0 auto 12px;display:flex;align-items:center;justify-content:center}
.course-card .icon-wrap svg{width:26px;height:26px;color:#fff}
.course-card h3{font-size:1.05rem;font-weight:700;margin-bottom:4px}
.course-card p{color:var(--text2);font-size:.8rem;line-height:1.4}
.course-card .tag{display:inline-block;margin-top:8px;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:600}
/* Header */
.header{position:sticky;top:0;z-index:100;background:var(--surface);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.header-left{display:flex;align-items:center;gap:14px}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text)}
.logo-icon{width:36px;height:36px;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.logo-icon svg{width:18px;height:18px;color:#fff}
.logo-text{font-size:1.05rem;font-weight:700;letter-spacing:-.02em}
.header-right{display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;gap:7px;padding:8px 16px;border:none;border-radius:var(--radius-sm);font-size:.82rem;font-weight:600;cursor:pointer;transition:var(--transition);font-family:inherit;white-space:nowrap;line-height:1.4}
.btn svg{width:15px;height:15px;flex-shrink:0}
.btn-primary{background:var(--primary);color:#fff}
.btn-primary:hover{background:var(--primary-hover);box-shadow:var(--shadow-glow)}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border)}
.btn-ghost:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.btn-icon{width:36px;height:36px;padding:0;justify-content:center;border-radius:var(--radius-sm);background:transparent;color:var(--text2);border:1px solid var(--border);display:flex;align-items:center;cursor:pointer;transition:var(--transition)}
.btn-icon:hover{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.btn-icon svg{width:18px;height:18px}
.layout{display:flex;min-height:calc(100vh - 60px)}
.sidebar{width:260px;min-width:260px;background:var(--surface);border-right:1px solid var(--border);padding:16px 0;overflow-y:auto;position:sticky;top:60px;height:calc(100vh - 60px);flex-shrink:0}
.sidebar-section{padding:0 12px;margin-bottom:6px}
.sidebar-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);padding:8px 12px 4px;margin-bottom:2px}
.nav-ch{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:var(--radius-sm);color:var(--text2);font-size:.82rem;font-weight:600;transition:var(--transition);cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.nav-ch:hover{background:var(--surface2);color:var(--text)}
.nav-ch.active{background:var(--primary-light);color:var(--primary)}
.nav-ch svg{width:16px;height:16px;flex-shrink:0;opacity:.55}
.nav-ch.active svg{opacity:1}
.nav-types{display:none;padding:2px 0 4px 20px}
.nav-types.open{display:block}
.nav-type{display:flex;align-items:center;gap:8px;padding:5px 12px;border-radius:6px;color:var(--text3);font-size:.78rem;font-weight:500;transition:var(--transition);cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:inherit}
.nav-type:hover{background:var(--surface2);color:var(--text2)}
.nav-type.active{color:var(--primary);font-weight:600}
.nav-type .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-mc{background:#4f46e5}.dot-tf{background:#059669}.dot-sa{background:#d97706}.dot-fill{background:#7c3aed}.dot-calc{background:#dc2626}.dot-qa{background:#0891b2}.dot-essay{background:#be185d}.dot-code{background:#dc2626}.dot-note{background:#0ea5e9}
.nav-type .cnt{margin-left:auto;font-size:.7rem;font-weight:700;padding:1px 6px;border-radius:8px;background:var(--surface2);color:var(--text3)}
.menu-btn{display:none}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;opacity:0;transition:opacity .3s}
.sidebar-overlay.open{display:block;opacity:1}
@media(max-width:860px){.sidebar{position:fixed;left:-280px;top:60px;z-index:201;transition:left .3s ease;width:270px;min-width:270px}.sidebar.open{left:0}.menu-btn{display:flex}.main{padding:20px 16px}}
.main{flex:1;padding:12px 10px;max-width:820px;margin:0 auto;width:100%}
.chapter-header{margin-bottom:24px}
.chapter-title{font-size:1.5rem;font-weight:800;letter-spacing:-.03em;margin-bottom:4px}
.chapter-focus{font-size:.82rem;color:var(--text2);padding:12px 16px;background:var(--focus-bg);border-radius:var(--radius);border-left:3px solid var(--primary);line-height:1.6}
.progress-wrap{margin-bottom:20px}
.progress-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.progress-label{font-size:.8rem;color:var(--text2);font-weight:500}
.progress-pct{font-size:.8rem;font-weight:700;color:var(--primary)}
.progress-track{height:5px;background:var(--border);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.type-header{display:flex;align-items:center;gap:10px;margin:32px 0 16px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.type-header:first-of-type{margin-top:0}
.type-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:.78rem;font-weight:700;color:#fff;flex-shrink:0}
.type-badge.mc{background:#4f46e5}.type-badge.tf{background:#059669}.type-badge.sa{background:#d97706}.type-badge.fill{background:#7c3aed}.type-badge.qa{background:#0891b2}.type-badge.essay{background:#be185d}.type-badge.code{background:#dc2626}.type-badge.note{background:#0ea5e9}.type-badge.longest{background:#e11d48}
.dot-longest{background:#e11d48}
.tag-longest{display:inline-block;font-size:.68rem;font-weight:700;color:#fff;background:#e11d48;padding:1px 8px;border-radius:10px;margin-left:6px;vertical-align:middle}
.type-title{font-size:.95rem;font-weight:700;color:var(--text)}
.q-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:10px 10px;margin-bottom:12px;transition:var(--transition)}
.q-card:hover{box-shadow:var(--shadow);border-color:var(--border2)}
.q-body{min-width:0}
.q-stem{font-weight:600;margin-bottom:14px;line-height:1.7;font-size:.92rem;display:flex;gap:10px;align-items:flex-start}
.q-num{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;color:var(--text2);margin-top:1px}
.q-stem code{background:var(--code-bg);border:1px solid var(--code-border);padding:1px 6px;border-radius:4px;font-size:.84em;font-family:'SF Mono','Fira Code',monospace}
pre{background:var(--code-bg);border:1px solid var(--code-border);padding:14px 16px;border-radius:var(--radius-sm);overflow-x:auto;font-size:.82rem;margin:10px 0;line-height:1.6;font-family:'SF Mono','Fira Code',monospace;color:var(--text);white-space:pre-wrap;word-wrap:break-word}
pre .kw{color:#8b5cf6;font-weight:600}
pre .fn{color:#2563eb}
pre .cm{color:#6b7280;font-style:italic}
pre .st{color:#059669}
.exam-table{width:100%;border-collapse:collapse;margin:10px 0;font-size:.85rem}
.exam-table th{background:var(--primary-light);color:var(--primary);font-weight:700;padding:8px 14px;border:1px solid var(--border);text-align:center}
.exam-table td{padding:7px 14px;border:1px solid var(--border);text-align:center}
.exam-table tr:nth-child(even){background:var(--surface2)}
.note-h{font-size:1.05rem;font-weight:700;color:var(--primary);margin-bottom:12px;padding:0 4px}
.note-c{font-size:.9rem;line-height:1.8;padding:0 4px;color:var(--text)}
.note-c b{color:var(--accent);font-weight:700}
.note-c br{margin-bottom:6px}
.options{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:flex-start;gap:12px;padding:11px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);cursor:pointer;transition:var(--transition);user-select:none}
.opt:hover{border-color:var(--primary);background:var(--primary-light)}
.opt.selected{border-color:var(--primary);background:var(--primary-light);box-shadow:var(--shadow-glow)}
.opt.correct{border-color:var(--success);background:var(--success-light);pointer-events:none}
.opt.wrong{border-color:var(--error);background:var(--error-light);pointer-events:none}
.opt-dot{width:18px;height:18px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;margin-top:1px;transition:var(--transition);display:flex;align-items:center;justify-content:center}
.opt.selected .opt-dot{border-color:var(--primary);background:var(--primary)}
.opt.selected .opt-dot::after{content:"";width:7px;height:7px;border-radius:50%;background:#fff}
.opt.correct .opt-dot{border-color:var(--success);background:var(--success)}
.opt.correct .opt-dot svg{width:11px;height:11px;color:#fff;display:block}
.opt.wrong .opt-dot{border-color:var(--error);background:var(--error)}
.opt.wrong .opt-dot svg{width:11px;height:11px;color:#fff;display:block}
.opt-label{font-size:.88rem;line-height:1.55}
.opt-label b{font-weight:700;color:var(--text);margin-right:4px}
.tf-group{display:flex;gap:10px}
.tf-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:11px;border-radius:var(--radius-sm);border:1.5px solid var(--border);cursor:pointer;font-weight:600;font-size:.86rem;transition:var(--transition);background:var(--surface);color:var(--text2);font-family:inherit}
.tf-btn svg{width:16px;height:16px}
.tf-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-light)}
.tf-btn.correct{border-color:var(--success);color:var(--success);background:var(--success-light);pointer-events:none}
.tf-btn.wrong{border-color:var(--error);color:var(--error);background:var(--error-light);pointer-events:none}
.sa-area{width:100%;min-height:90px;padding:14px 16px;border:1.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);color:var(--text);font-size:.88rem;resize:vertical;font-family:inherit;transition:var(--transition);line-height:1.6}
.sa-area:focus{outline:none;border-color:var(--primary);box-shadow:var(--shadow-glow)}
.sa-area::placeholder{color:var(--text3)}
.ans-box{margin-top:12px;padding:14px 16px;border-radius:var(--radius-sm);font-size:.86rem;line-height:1.65;display:none;animation:fadeUp .25s ease}
.ans-box.show{display:block}
.ans-box.ok{background:var(--success-light);border:1px solid var(--success-border);color:var(--text)}
.ans-box.fail{background:var(--error-light);border:1px solid var(--error-border);color:var(--text)}
.ans-box.reveal{background:var(--primary-light);border:1px solid var(--primary);color:var(--text);opacity:.92}
.ans-title{font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.ans-title svg{width:15px;height:15px}
.float-bar{position:fixed;bottom:24px;right:24px;display:flex;gap:8px;z-index:50}
@media(max-width:860px){.float-bar{bottom:16px;right:16px;gap:6px}.float-bar .btn span{display:none}}
.modal-mask{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;align-items:center;justify-content:center}
.modal-mask.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);padding:36px;max-width:400px;width:90%;text-align:center;box-shadow:var(--shadow-lg);animation:fadeUp .3s ease}
.modal-icon{width:56px;height:56px;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--primary),var(--accent))}
.modal-icon svg{width:28px;height:28px;color:#fff}
.modal h2{font-size:1.15rem;font-weight:700;margin-bottom:6px}
.modal p{color:var(--text2);margin-bottom:24px;font-size:.9rem}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::selection{background:var(--primary);color:#fff}
</style>
</head>
<body>
<!-- ===== LANDING ===== -->
<div class="landing" id="landing" style="display:none">
  <div class="landing-title"><h1>考试刷题系统</h1><p>选择课程开始刷题</p></div>
  <div class="course-grid">
    <div class="course-card" onclick="enterCourse('os')">
      <div class="icon-wrap" style="background:linear-gradient(135deg,#059669,#10b981)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="15" y2="13"/><line x1="9" y1="17" x2="12" y2="17"/></svg></div>
      <h3>操作系统</h3><p>7 章 · 进程控制、处理机调度、死锁、存储管理、虚拟存储、I/O与文件管理、期末复习</p><span class="tag" style="background:var(--success-light);color:var(--success)">150+ 题</span>
    </div>
  </div>
</div>
<!-- ===== APP ===== -->
<div id="app" style="display:block">
<header class="header">
  <div class="header-left">
    <button class="btn-icon menu-btn" onclick="toggleSidebar()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <button class="btn-icon" onclick="goHome()" title="返回选择"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
    <a class="logo" href="#" onclick="goHome();return false"><span class="logo-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span><span class="logo-text" id="header-title">考试刷题系统</span></a>
  </div>
  <div class="header-right">
    <button class="btn-icon" onclick="resetAll()" title="重置进度"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg></button>
    <button class="btn-icon" onclick="toggleTheme()" title="切换主题"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-sun"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon-moon" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button>
  </div>
</header>
<div class="sidebar-overlay" onclick="toggleSidebar()"></div>
<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <div class="main" id="main"></div>
</div>
<div class="float-bar">
  <button class="btn btn-primary" onclick="submitAll()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg><span>提交全部</span></button>
</div>
<div class="modal-mask" id="modal">
  <div class="modal">
    <div class="modal-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></div>
    <h2 id="modal-title">批改完成</h2>
    <p id="modal-body"></p>
    <button class="btn btn-primary" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>关闭</button>
  </div>
</div>

os7:{title:"期末复习综合",icon:5,focus:"简答题 11 + 论述题 11 = 22题",
qa:[
{q:"1. 在哪些情形下，系统可能会进行进程的调度？",a:"(1) 当一个新的进程被创建时；<br>(2) 当一个进程运行完毕时；<br>(3) 当一个进程由于 I/O、信号量或其他的某个原因被阻塞时；<br>(4) 当一个 I/O 中断发生时，表明某个 I/O 操作已经完成，而等待该 I/O 操作的进程转入就绪状态；<br>(5) 在分时系统中，当一个进程的时间片用完时。"},
{q:"2. 请简要说明什么是虚拟内存？它的主要作用是什么？",a:"<b>(1) 虚拟内存的定义：</b>通过将硬盘空间扩展为'辅助内存'，使程序可以使用比物理内存更大的地址空间。<br><br><b>(2) 主要作用：</b><br>① 实现内存的逻辑扩展，运行比物理内存更大的程序；<br>② 通过分页/分段机制隔离进程地址空间，提高安全性；<br>③ 利用局部性原理提高内存利用率。"},
{q:"3. 文件系统的主要功能是什么？",a:"(1) 组织和管理磁盘上的文件；\n(2) 提供文件的存取控制。"},
{q:"4. 请简单说明什么是进程？进程有哪三种基本状态？",a:"<b>(1) 进程的定义：</b>进程是程序在计算机中的一次动态执行过程，它是操作系统进行资源分配和调度的基本单位。进程不仅包含程序代码和数据，还维护着运行时的状态信息，如寄存器值、内存分配、打开的文件等，确保程序能够正确执行。<br><br><b>(2) 三种基本状态：</b>就绪态、运行态、阻塞态。"},
{q:"5. 存储器管理的主要功能是什么？请列举 3 个主要功能。",a:"<b>(1) 内存分配与回收：</b>操作系统为运行中的程序分配所需的内存空间，确保程序能够正常加载和执行。当程序运行结束或主动释放内存时，系统回收这些空间，以便重新分配给其他程序使用，提高内存利用率。<br><br><b>(2) 地址转换：</b>操作系统通过地址转换机制，将程序使用的逻辑地址映射到实际内存中的物理地址，确保程序正确访问数据。转换过程依赖页表（分页管理）或段表（分段管理）来完成地址映射，由内存管理单元（MMU）硬件加速实现。<br><br><b>(3) 内存保护：</b>操作系统通过内存管理机制确保每个进程只能访问自身分配的内存区域，防止非法读写其他进程或系统的内存数据。"},
{q:"6. 进程与程序的区别？",a:"<b>进程</b>是一段运行的有生命力的程序，它是一个动态的概念；<br><b>程序</b>是存储在磁盘或其他存储介质中的静态代码，是一种静态的概念。"},
{q:"7. 请简述库函数与系统调用函数的关系",a:"<b>（1）库函数由两类函数组成：</b><br>① 不需要调用系统调用，不需要切换到内核空间即可完成函数全部功能，并且将结果反馈给应用程序，如 strcpy、bzero 等字符串操作函数。<br>② 需要调用系统调用，需要切换到内核空间，这类函数通过封装系统调用去实现相应功能，如 printf、fread 等。<br><br><b>（2）系统调用的开销：</b><br>系统调用是需要时间的，程序中频繁的使用系统调用会降低程序的运行效率。当运行内核代码时，CPU 工作在内核态，在系统调用发生前需要保存用户态的栈和内存环境，然后转入内核态工作。系统调用结束后，又要切换回用户态。这种环境的切换会消耗掉许多时间。<br>库函数访问文件的时候根据需要，设置不同类型的缓冲区，从而减少了直接调用 I/O 系统调用的次数，提高了访问效率。"},
{q:"8. 简述操作系统管理 I/O 设备的三种主要方式。",a:"<b>(1) 程序直接控制方式：</b>CPU 需要亲自参与每一次数据的输入/输出操作，包括数据搬运和设备状态管理，导致 CPU 利用率较低。CPU 通过不断循环查询（轮询）I/O 设备的状态寄存器，判断设备是否就绪，造成大量空转等待，效率低下但实现简单。<br><br><b>(2) 中断驱动方式：</b>当 I/O 设备完成操作准备就绪后，主动向 CPU 发送中断请求信号，无需 CPU 持续轮询状态。CPU 在执行完当前指令后，根据中断优先级决定是否立即响应，通过中断服务程序进行后续处理，处理完成后返回原程序继续执行。<br><br><b>(3) DMA 方式：</b>DMA 控制器（DMAC）直接接管数据传输过程，在外设与内存之间建立通道，无需 CPU 参与每个数据的搬运操作。CPU 仅在传输开始前设置参数（如内存地址、数据长度）和传输结束后处理中断，大幅减少 CPU 占用时间。适用于磁盘、网卡等需要大批量连续数据传输的场景。"},
{q:"9. 文件系统中，什么是'文件控制块'（FCB）？它主要包含哪些信息？",a:"<b>(1) FCB 定义：</b>FCB 是操作系统为每个文件维护的元信息集合，用于记录和管理文件的各类属性和状态。<br><br><b>(2) 包含信息：</b>文件名、文件大小、文件位置、访问权限等。"},
{q:"10. 进程有哪三种基本状态？请简述或画出三种状态之间的转换关系。",a:"<b>三种基本状态：</b>就绪状态、执行状态、阻塞状态。<br><br><div style='text-align:center;margin:16px 0'><svg width='340' height='220' viewBox='0 0 340 220'><defs><marker id='arrow' markerWidth='10' markerHeight='7' refX='9' refY='3.5' orient='auto'><polygon points='0 0, 10 3.5, 0 7' fill='#4f46e5'/></marker></defs><circle cx='170' cy='40' r='36' fill='#eef2ff' stroke='#4f46e5' stroke-width='2'/><text x='170' y='45' text-anchor='middle' font-size='15' font-weight='700' fill='#4f46e5'>就绪</text><circle cx='280' cy='180' r='36' fill='#ecfdf5' stroke='#059669' stroke-width='2'/><text x='280' y='185' text-anchor='middle' font-size='15' font-weight='700' fill='#059669'>执行</text><circle cx='60' cy='180' r='36' fill='#fef2f2' stroke='#dc2626' stroke-width='2'/><text x='60' y='185' text-anchor='middle' font-size='15' font-weight='700' fill='#dc2626'>阻塞</text><line x1='195' y1='68' x2='255' y2='152' stroke='#4f46e5' stroke-width='2' marker-end='url(#arrow)'/><text x='248' y='100' font-size='11' fill='#6b7194' transform='rotate(40,248,100)'>进程调度</text><line x1='255' y1='158' x2='195' y2='72' stroke='#4f46e5' stroke-width='2' marker-end='url(#arrow)'/><text x='210' y='135' font-size='11' fill='#6b7194' transform='rotate(-40,210,135)'>时间片完</text><line x1='248' y1='195' x2='96' y2='195' stroke='#4f46e5' stroke-width='2' marker-end='url(#arrow)'/><text x='170' y='213' text-anchor='middle' font-size='11' fill='#6b7194'>I/O 请求</text><line x1='85' y1='155' x2='145' y2='72' stroke='#4f46e5' stroke-width='2' marker-end='url(#arrow)'/><text x='95' y='105' font-size='11' fill='#6b7194' transform='rotate(-40,95,105)'>I/O 完成</text><line x1='316' y1='180' x2='338' y2='180' stroke='#4f46e5' stroke-width='2' marker-end='url(#arrow)'/><text x='325' y='172' font-size='11' fill='#6b7194'>终止</text></svg></div><b>转换关系：</b><br>就绪→执行：进程调度（调度器选中该进程）<br>执行→就绪：时间片完（时间片用完被抢占）<br>执行→阻塞：I/O 请求（等待 I/O 或事件）<br>阻塞→就绪：I/O 完成（I/O 完成或事件发生）<br>执行→终止：进程结束运行"},
{q:"11. 简述僵尸进程、孤儿进程、守护进程",a:"<b>僵尸进程：</b>进程已运行结束，但进程占用的资源未被回收，这样的进程称为僵尸进程。子进程已运行结束，父进程未调用 wait 或 waitpid 函数回收子进程的资源是子进程变为僵尸进程的原因。<br><br><b>孤儿进程：</b>父进程运行结束，但子进程未运行结束的子进程。<br><br><b>守护进程：</b>守护进程是个特殊的孤儿进程，这种进程脱离终端，在后台运行。"}
],
essay:[
{q:"1. 有一个临界资源 R 和两个进程 P1、P2。要求用 PV 操作实现进程互斥访问 R。请补全以下伪代码：<pre>semaphore S = _____;\nprocess P1() {\n  ________ (S);\n  // 访问临界资源 R\n  ________(S);\n}\nprocess P2() {\n  ________(S);\n  // 访问临界资源 R\n  ________(S);\n}</pre>",a:"<pre>semaphore S = 1;\nprocess P1() {\n  P(S);\n  // 访问临界资源 R\n  V(S);\n}\nprocess P2() {\n  P(S);\n  // 访问临界资源 R\n  V(S);\n}</pre><b>说明：</b>初始值 S=1 保证同时只有一个进程进入临界区。P 操作（减 1）用于申请，V 操作（加 1）用于释放。"},
{q:"2. 某银行有一个 ATM 机（临界资源），三个客户（客户 A、客户 B、客户 C）需要互斥使用它进行取款操作。请使用 PV 操作实现 ATM 机的互斥访问，补全以下伪代码：<pre>semaphore atm_lock = ___;\nprocess 客户A() {\n  (atm_lock);\n  printf(\"客户A正在取款...\\n\");\n  (atm_lock);\n}\nprocess 客户B() {\n  (atm_lock);\n  printf(\"客户B正在取款...\\n\");\n  (atm_lock);\n}\nprocess 客户C() {\n  (atm_lock);\n  printf(\"客户C正在取款...\\n\");\n  (atm_lock);\n}</pre>",a:"<pre>semaphore atm_lock = 1;\nprocess 客户A() {\n  P(atm_lock);\n  printf(\"客户A正在取款...\\n\");\n  V(atm_lock);\n}\nprocess 客户B() {\n  P(atm_lock);\n  printf(\"客户B正在取款...\\n\");\n  V(atm_lock);\n}\nprocess 客户C() {\n  P(atm_lock);\n  printf(\"客户C正在取款...\\n\");\n  V(atm_lock);\n}</pre>"},
{q:"3. 有一组进程在一个单 CPU 的系统上运行，它们的到达时间和预计运行时间如下：<table class='exam-table'><tr><th>进程</th><th>到达时间</th><th>运行时间</th></tr><tr><td>P1</td><td>0</td><td>7</td></tr><tr><td>P2</td><td>2</td><td>4</td></tr><tr><td>P3</td><td>4</td><td>1</td></tr><tr><td>P4</td><td>5</td><td>4</td></tr></table>(1) 采用先来先服务（FCFS）算法，请计算执行顺序、周转时间、带权周转时间、等待时间、平均周转时间、平均带权周转时间、平均等待时间。\n(2) 请说出 FCFS 算法的优点及缺点。",a:"<b>(1) 执行顺序：</b>P1→P2→P3→P4<br><br><table class='exam-table'><tr><th>进程</th><th>完成时间</th><th>周转时间</th><th>等待时间</th><th>带权周转</th></tr><tr><td>P1</td><td>7</td><td>7-0=7</td><td>0</td><td>7/7=1.0</td></tr><tr><td>P2</td><td>11</td><td>11-2=9</td><td>5</td><td>9/4=2.25</td></tr><tr><td>P3</td><td>12</td><td>12-4=8</td><td>7</td><td>8/1=8.0</td></tr><tr><td>P4</td><td>16</td><td>16-5=11</td><td>7</td><td>11/4=2.75</td></tr></table><br>平均周转时间=(7+9+8+11)/4=8.75<br>平均带权周转时间=(1.0+2.25+8.0+2.75)/4=3.5<br>平均等待时间=(0+5+7+7)/4=4.75<br><br><b>(2) 优缺点：</b><br>优点：实现简单，对所有进程公平，先到先服务。<br>缺点：对短作业不利（可能产生护航效应），对 I/O 密集型进程不友好。"},
{q:"4. 有 5 个作业在时间 0 同时到达，运行时间如下：<pre>J1:6  J2:3  J3:8  J4:2  J5:4</pre>(1) 写出非抢占式短作业优先调度算法下作业的执行顺序。\n(2) 计算每个作业的周转时间和平均周转时间。\n(3) 简要说明非抢占式 SJF 算法的优缺点。",a:"<b>(1) 执行顺序：</b>J4(2)→J2(3)→J5(4)→J1(6)→J3(8)<br><br><b>(2) 周转时间：</b><br><table class='exam-table'><tr><th>作业</th><th>运行时间</th><th>周转时间</th></tr><tr><td>J4</td><td>2</td><td>2-0=2</td></tr><tr><td>J2</td><td>3</td><td>2+3-0=5</td></tr><tr><td>J5</td><td>4</td><td>2+3+4-0=9</td></tr><tr><td>J1</td><td>6</td><td>2+3+4+6-0=15</td></tr><tr><td>J3</td><td>8</td><td>2+3+4+6+8-0=23</td></tr></table><br>平均周转时间=(2+5+9+15+23)/5=10.8<br><br><b>(3) 优缺点：</b><br>优点：平均等待时间最短，对短作业有利。<br>缺点：长作业可能饥饿；需要预知作业运行时间。"},
{q:"5. 某系统采用页式存储管理，某个程序为 16KB，页面大小为 1KB。页表如下：<table class='exam-table'><tr><th>页号</th><th>页框号</th></tr><tr><td>0</td><td>3</td></tr><tr><td>1</td><td>7</td></tr><tr><td>2</td><td>2</td></tr><tr><td>3</td><td>8</td></tr></table>程序的逻辑地址为 00 1110 0011 1111（二进制），对应的物理地址是多少（内存为 128KB）？要求写出计算步骤、物理地址用二进制表示。",a:"页面大小 1KB = 2<sup>10</sup>，所以页内偏移占 10 位。<br><br>逻辑地址：00 1110 0011 1111<br>低 10 位为页内偏移：00 0011 1111<br>高 6 位为页号：00 1110 → 但实际页号只有 4 位有效（页表共 4 项），页号 = 0011 = 3<br><br>查表：页号 3 → 页框号 8<br>页框号 8 的二进制：1000<br><br><b>物理地址</b> = 页框号拼接偏移 = <b>1000 00 0011 1111</b>（二进制）"},
{q:"6. 假设系统为某进程分配了三个内存块，页面号引用串为 7,0,1,2,0,3,0,1,7,0,1，采用最佳置换算法（OPT）：\n(1) 给出进程访问页面过程。\n(2) 算出发生几次缺页中断、发生几次页面置换？",a:"<b>(1) OPT 置换过程：</b>每次淘汰将来最久不用的页面。<br><table class='exam-table'><tr><th>访问页面</th><th>7</th><th>0</th><th>1</th><th>2</th><th>0</th><th>3</th><th>0</th><th>1</th><th>7</th><th>0</th><th>1</th></tr><tr><td>内存块1</td><td>7</td><td>7</td><td>7</td><td>2</td><td>2</td><td>2</td><td>2</td><td>1</td><td>7</td><td>7</td><td>7</td></tr><tr><td>内存块2</td><td></td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td><td>0</td></tr><tr><td>内存块3</td><td></td><td></td><td>1</td><td>1</td><td>1</td><td>3</td><td>3</td><td>3</td><td>3</td><td>3</td><td>1</td></tr><tr><td>是否缺页</td><td>缺页</td><td>缺页</td><td>缺页</td><td>缺页</td><td>命中</td><td>缺页</td><td>命中</td><td>缺页</td><td>缺页</td><td>缺页</td><td>缺页</td></tr></table><br><b>(2)</b> 缺页中断：<b>9 次</b>，页面置换：<b>6 次</b>"},
{q:"7. 假设系统为某进程分配了四个内存块，页面号引用串为 1,8,1,7,8,2,7,2,1,8,3，采用最近最久未使用置换算法（LRU）：\n(1) 给出进程访问页面过程。\n(2) 算出发生几次缺页中断、发生几次页面置换？",a:"<b>(1) LRU 置换过程：</b>淘汰最近最久未使用的页面。<br><table class='exam-table'><tr><th>访问页面</th><th>1</th><th>8</th><th>1</th><th>7</th><th>8</th><th>2</th><th>7</th><th>2</th><th>1</th><th>8</th><th>3</th></tr><tr><td>内存块1</td><td>1</td><td>1</td><td>1</td><td>1</td><td>1</td><td>1</td><td>7</td><td>7</td><td>1</td><td>1</td><td>1</td></tr><tr><td>内存块2</td><td></td><td>8</td><td>8</td><td>8</td><td>8</td><td>8</td><td>8</td><td>8</td><td>8</td><td>8</td><td>8</td></tr><tr><td>内存块3</td><td></td><td></td><td></td><td>7</td><td>7</td><td>7</td><td>2</td><td>2</td><td>2</td><td>2</td><td>2</td></tr><tr><td>内存块4</td><td></td><td></td><td></td><td></td><td></td><td>2</td><td>1</td><td>1</td><td>7</td><td>7</td><td>3</td></tr><tr><td>是否缺页</td><td>缺页</td><td>缺页</td><td>命中</td><td>缺页</td><td>命中</td><td>缺页</td><td>缺页</td><td>命中</td><td>命中</td><td>命中</td><td>缺页</td></tr></table><br><b>(2)</b> 缺页中断：<b>5 次</b>，页面置换：<b>1 次</b>"},
{q:"8. 有 5 个进程需要调度执行，若采用非抢占式优先级（短进程优先）调度算法，求这 5 个进程的平均周转时间。",a:"按运行时间排序执行（短进程优先），依次计算各进程的周转时间，再求平均值。<br><br><b>执行顺序：</b>按运行时间从小到大排列<br><b>周转时间</b> = 完成时间 - 到达时间<br><b>平均周转时间</b> = 各进程周转时间之和 / 进程数"},
{q:"9. 假定要在一台处理机上执行下表所示的作业，且假定这些作业在时刻 0 以 1,2,3,4,5 的顺序到达。请说明分别采用 FCFS、RR(时间片为 1)、SJF 及非抢占式优先级调度算法时，这些作业的执行情况（优先级的高低顺序依次为 1 到 5）。针对上述每种调度算法，求出平均周转时间。",a:"<b>分别按各算法规则模拟执行：</b><br><br><b>FCFS：</b>按到达顺序 1→2→3→4→5 执行。<br><b>RR(时间片=1)：</b>每个作业轮流执行 1 个时间片。<br><b>SJF：</b>按运行时间从短到长执行。<br><b>优先级调度：</b>按优先级 1→2→3→4→5 执行。<br><br>对每种算法计算各作业的周转时间，再求平均值进行比较。"},
{q:"10. 在生产流水线上有三个工序：取件(getter)、传送(transfer)、加工(processor)。试用信号量的 P、V 操作实现 getter、transfer、processor 之间的同步与互斥关系，补全下面代码中的空白。<pre>信号量 g_sema = (空白1);\n信号量 t_sema = (空白2);\n信号量 p_sema = (空白3);\nvoid getter() {\n  while(true) {\n    P(g_sema);\n    取件工序操作\n    V((空白4));\n  }\n}\nvoid transfer() {\n  while(true) {\n    P((空白5));\n    传送工序操作\n    V((空白6));\n  }\n}\nvoid processor() {\n  while(true) {\n    P((空白7));\n    加工工序操作\n    V((空白8));\n  }\n}</pre>",a:"<pre>g_sema = 1;  // 初始可取件\nt_sema = 0;  // 初始不可传送\np_sema = 0;  // 初始不可加工\n\nvoid getter() {\n  while(true) {\n    P(g_sema);\n    取件工序操作\n    V(t_sema);   // 空白4: 取完件后通知可传送\n  }\n}\nvoid transfer() {\n  while(true) {\n    P(t_sema);   // 空白5: 等待可传送信号\n    传送工序操作\n    V(p_sema);   // 空白6: 传完后通知可加工\n  }\n}\nvoid processor() {\n  while(true) {\n    P(p_sema);   // 空白7: 等待可加工信号\n    加工工序操作\n    V(g_sema);   // 空白8: 加工完后通知可取件\n  }\n}</pre>"},
{q:"11. 支持虚拟页式存储管理的系统中，硬件参数如下：虚拟地址空间为 16 位，页面大小为 1KB，物理内存大小为 4KB（共有 4 个物理块）。某进程页表如下：<table class='exam-table'><tr><th>页号</th><th>物理块号</th><th>有效位</th></tr><tr><td>0</td><td>2</td><td>1</td></tr><tr><td>1</td><td>5</td><td>1</td></tr><tr><td>2</td><td>—</td><td>0</td></tr><tr><td>3</td><td>8</td><td>1</td></tr></table>进程的内存访问指令序列（10进制）：1040 → 2069 → 4128 → 3088\n\n(1) 地址 1040 的页号和页内偏移量？对应物理地址？\n(2) 地址 2069 的页号和页内偏移量？是否产生中断？\n(3) 地址 4128 的页号和页内偏移量？是否产生中断？\n\n第二部分：假设采用 OPT 算法，初始已调入第 0、1、3 页（物理块 2,5,8），页号引用序列为 1,3,2,3,1,0：\n(4) 画出 OPT 置换过程表。\n(5) 计算缺页率。",a:"<b>第一部分：地址转换</b><br>页面大小 1KB = 2<sup>10</sup>，偏移占 10 位，页号占 16-10=6 位。<br><br><b>(1)</b> 1040 = 1024+16 → 页号=1，偏移=16<br>页表：页号1→物理块5 → 物理地址 = 5×1024+16 = <b>5136</b><br><br><b>(2)</b> 2069 = 2048+21 → 页号=2，偏移=21<br>页表：页号2 有效位=0 → <b>缺页中断</b><br><br><b>(3)</b> 4128 = 4×1024+32 → 页号=4，偏移=32<br>页号4 超出页表范围 → <b>越界中断</b><br><br><b>第二部分：OPT 算法</b><br>初始：物理块[2,5,8] → 页面[0,1,3]<br><table class='exam-table'><tr><th>引用</th><th>1</th><th>3</th><th>2</th><th>3</th><th>1</th><th>0</th></tr><tr><td>物理块2</td><td>1</td><td>1</td><td>2</td><td>2</td><td>2</td><td>0</td></tr><tr><td>物理块5</td><td>1</td><td>1</td><td>1</td><td>1</td><td>1</td><td>1</td></tr><tr><td>物理块8</td><td>3</td><td>3</td><td>3</td><td>3</td><td>3</td><td>3</td></tr><tr><td>是否缺页</td><td>命中</td><td>命中</td><td>缺页</td><td>命中</td><td>命中</td><td>缺页</td></tr></table><br><b>(5)</b> 缺页 2 次，缺页率 = 2/6 ≈ <b>33.3%</b>"}
]},

{q:"用数组实现循环队列，包含入队、出队、判空、判满方法。\n<pre>class CirQueue:</pre>",a:"<pre>class CirQueue:\n    def __init__(self, max_size=5):\n        self.max = max_size\n        self.data = [None] * self.max\n        self.front = self.rear = 0\n\n    def is_empty(self):\n        return self.front == self.rear\n\n    def is_full(self):\n        return (self.rear + 1) % self.max == self.front\n\n    def enqueue(self, x):\n        if self.is_full(): return False\n        self.data[self.rear] = x\n        self.rear = (self.rear + 1) % self.max\n        return True\n\n    def dequeue(self):\n        if self.is_empty(): return None\n        val = self.data[self.front]\n        self.front = (self.front + 1) % self.max\n        return val</pre>"},

note:[
{h:"一、机器学习概述与基本流程",c:"<b>机器学习：</b>让计算机从数据中学习规律，对新数据进行预测或决策，无需显式编程。<br><br><b>按任务类型分三大类：</b><br>• <b>监督学习：</b>有标签数据，如分类（离散）、回归（连续）。<br>• <b>无监督学习：</b>无标签数据，如聚类、降维。<br>• <b>半监督学习：</b>少量有标签 + 大量无标签数据。<br><br><b>核心流程：</b>数据预处理 → 特征提取 → 模型训练 → 模型评估 → 预测应用"},
{h:"二、线性回归与逻辑回归",c:"<b>线性回归：</b>y = w₁x₁ + w₂x₂ + ... + wₙxₙ + b，输出连续值。损失函数为MSE（均方误差）。参数求解可用最小二乘法（解析解）或梯度下降法。正则化：岭回归（L2）、Lasso回归（L1）。<br><br><b>逻辑回归：</b>用于二分类，通过Sigmoid函数将线性输出映射到(0,1)概率值。σ(z) = 1/(1+e⁻ᶻ)。决策边界以0.5为阈值。损失函数为对数似然损失（交叉熵损失）。<br><br><b>对比：</b>线性回归→回归连续值；逻辑回归→分类离散标签。线性回归用MSE，逻辑回归用交叉熵损失。"},
{h:"三、K近邻算法（KNN）",c:"<b>原理：</b>计算待预测样本与所有训练样本的距离，找最近k个近邻，分类用投票、回归取平均。<br><br><b>k值选择：</b>过大→欠拟合，过小→过拟合，需交叉验证确定。<br><br><b>优点：</b>原理简单，无需训练（惰性学习），适合多分类，k较大时对异常值不敏感。<br><b>缺点：</b>预测计算量大，需存储全部数据，对特征尺度敏感需标准化。"},
{h:"四、朴素贝叶斯",c:"<b>原理：</b>基于贝叶斯定理，假设特征之间条件独立（「朴素」含义）。<br>公式：P(Y|X) = P(X|Y)·P(Y) / P(X)<br>核心：先验概率P(Y) + 条件概率（似然）P(X|Y)。<br><br><b>分类决策：</b>计算每个类别的后验概率P(Y|X)，选择最大的作为预测结果。<br><br><b>常见变体：</b>高斯朴素贝叶斯（连续数据）、多项式朴素贝叶斯（文本分类）、伯努利朴素贝叶斯（二值特征）。"},
{h:"五、决策树",c:"<b>核心思想：</b>基于特征对样本递归划分，形成树形结构。<br><br><b>三种经典算法对比：</b><br>• <b>ID3：</b>用信息增益，多叉树，偏向取值多的特征。<br>• <b>C4.5：</b>用信息增益比，多叉树，克服ID3的多值偏向。<br>• <b>CART：</b>用基尼指数/平方误差，二叉树，可分类也可回归。<br><br><b>信息熵：</b>H(D) = -Σpᵢlog₂pᵢ，衡量数据不确定性。<br><b>信息增益：</b>Gain(D,A) = H(D) - H(D|A)<br><b>信息增益比：</b>Gain_ratio = Gain(D,A) / Hₐ(D)"},
{h:"六、支持向量机（SVM）",c:"<b>核心思想：</b>寻找最优超平面，使两类样本间隔最大化。<br><br><b>关键概念：</b><br>• <b>硬间隔：</b>严格要求全部正确分类，适用于线性可分。<br>• <b>软间隔：</b>引入松弛变量，允许部分错误，适用于近似线性可分。<br>• <b>核函数：</b>将低维映射到高维，解决线性不可分。<br><br><b>常用核函数：</b>线性核 K(x,y)=xᵀy；多项式核 (xᵀy+c)ᵈ；高斯核(RBF) exp(-γ‖x-y‖²) 最常用；Sigmoid核 tanh(αxᵀy+c)。"},
{h:"七、集成学习",c:"<b>Bagging vs Boosting：</b><br>• Bagging：有放回随机采样（Bootstrap），基学习器并行训练相互独立，主要降低方差，代表为随机森林。<br>• Boosting：根据错误率调整样本权重，串行训练后一个纠正前一个，主要降低偏差，代表为AdaBoost、GBDT、XGBoost。<br><br><b>随机森林：</b>Bagging典型代表，基学习器为决策树。双重随机性：样本随机采样 + 特征随机选择。分类用多数投票，回归取平均值。<br><br><b>Boosting系列：</b>AdaBoost调整样本权重；GBDT拟合残差（负梯度）；XGBoost支持二阶导数、正则化、并行计算。"},
{h:"八、聚类算法（无监督学习）",c:"<b>K-Means：</b>最小化样本到簇中心的距离平方和（SSE）。步骤：①随机选k个簇中心→②分配样本到最近簇→③更新簇中心→重复②③直到收敛。需预先指定k，对初始中心敏感，适合球形簇。<br><br><b>层次聚类：</b>自底向上（凝聚）或自顶向下（分裂）构建聚类树。无需预先指定簇数。<br><br><b>DBSCAN：</b>基于密度的聚类，可发现任意形状的簇。核心参数：邻域半径ε和最小样本数MinPts。能识别噪声点，无需指定簇数。"},
{h:"九、神经网络",c:"<b>基本结构：</b>输入层、隐藏层、输出层组成，神经元通过权重连接。激活函数为模型引入非线性。<br><br><b>常用激活函数：</b><br>• Sigmoid：σ(z)=1/(1+e⁻ᶻ)，输出(0,1)<br>• Tanh：(eᶻ-e⁻ᶻ)/(eᶻ+e⁻ᶻ)，输出(-1,1)<br>• ReLU：max(0,z)，输出[0,+∞)<br>• Softmax：eᶻⁱ/Σeᶻʲ，输出(0,1)且和为1<br><br><b>训练过程：</b>前向传播逐层计算输出 → 反向传播用链式法则计算梯度 → 优化算法（SGD、Adam等）更新权重。"},
{h:"十、模型评估与Python工具",c:"<b>二分类评估指标：</b><br>• <b>准确率(Accuracy)：</b>正确预测数/总样本数<br>• <b>精确率(Precision)：</b>TP/(TP+FP)<br>• <b>召回率(Recall)：</b>TP/(TP+FN)<br>• <b>F1值：</b>精确率和召回率的调和平均<br>• <b>ROC曲线与AUC值：</b>衡量模型在不同阈值下的整体性能<br><br><b>Python第三方库：</b><br>• Scikit-learn(sklearn)：核心ML库<br>• NumPy：数值计算基础库<br>• Pandas：数据处理与分析<br>• Matplotlib：数据可视化"}
]}

function initA(){A={};for(let c in courseData){A[c]={mc:{},tf:{},fill:{},sa:{},code:{}};if(courseData[c].mc)courseData[c].mc.forEach((_,i)=>A[c].mc[i]=false);if(courseData[c].tf)courseData[c].tf.forEach((_,i)=>A[c].tf[i]=false);if(courseData[c].fill)courseData[c].fill.forEach((_,i)=>A[c].fill[i]=false);if(courseData[c].sa)courseData[c].sa.forEach((_,i)=>A[c].sa[i]=false);if(courseData[c].code)courseData[c].code.forEach((_,i)=>A[c].code[i]=false);A[c]._lmc=getLongestMC(courseData[c]);}}
function clen(c){const n=c.charCodeAt(0);return(n>=0x4e00&&n<=0x9fff)||(n>=0x3000&&n<=0x303f)||(n>=0xff00&&n<=0xffef)?2:1}
function vlen(s){return[...s].reduce((a,c)=>a+clen(c),0)}
function getLongestMC(ch){
  if(!ch||!ch.mc)return [];
  const r=[];
  ch.mc.forEach((q,i)=>{
    const lens=q.o.map(o=>vlen(o));
    const ml=Math.max(...lens);
    if(lens[q.a]===ml&&lens.filter(l=>l===ml).length===1)r.push(i);
  });
  return r;
}

function buildSidebar(){

  for(let c in courseData){
    const ch=courseData[c],mc=ch.mc?ch.mc.length:0,tf=ch.tf?ch.tf.length:0,fill=ch.fill?ch.fill.length:0,qa=ch.qa?ch.qa.length:0,essay=ch.essay?ch.essay.length:0,sa=ch.sa?ch.sa.length:0,code=ch.code?ch.code.length:0,note=ch.note?ch.note.length:0;
    const isActive=c===cur;
    h+=`<button class="nav-ch${isActive?' active':''}" data-ch="${c}" onclick="pickCh('${c}',this)">${icons[ch.icon]||icons[0]}${ch.title}</button>`;

    if(mc)h+=`<button class="nav-type" onclick="pickType('${c}','mc',this)"><span class="dot dot-mc"></span>选择题<span class="cnt">${mc}</span></button>`;
    if(tf)h+=`<button class="nav-type" onclick="pickType('${c}','tf',this)"><span class="dot dot-tf"></span>判断题<span class="cnt">${tf}</span></button>`;
    if(fill)h+=`<button class="nav-type" onclick="pickType('${c}','fill',this)"><span class="dot dot-sa"></span>填空题<span class="cnt">${fill}</span></button>`;
    if(qa)h+=`<button class="nav-type" onclick="pickType('${c}','qa',this)"><span class="dot dot-qa"></span>问答题<span class="cnt">${qa}</span></button>`;
    if(essay)h+=`<button class="nav-type" onclick="pickType('${c}','essay',this)"><span class="dot dot-essay"></span>论述题<span class="cnt">${essay}</span></button>`;
    if(sa)h+=`<button class="nav-type" onclick="pickType('${c}','sa',this)"><span class="dot dot-sa"></span>简答题<span class="cnt">${sa}</span></button>`;
    if(code)h+=`<button class="nav-type" onclick="pickType('${c}','code',this)"><span class="dot dot-code"></span>代码题<span class="cnt">${code}</span></button>`;
    if(note)h+=`<button class="nav-type" onclick="pickType('${c}','note',this)"><span class="dot dot-note"></span>知识点<span class="cnt">${note}</span></button>`;
    if(mc){const lc=A[c]._lmc.length;if(lc&&lc<mc)h+=`<button class="nav-type" onclick="pickType('${c}','longest',this)"><span class="dot dot-longest"></span>答案最长<span class="cnt">${lc}</span></button>`;}
    h+=`</div>`;
  }
  h+=`</div>`;
  sb.innerHTML=h;
}

function toggleSidebar(){document.querySelector('.sidebar').classList.toggle('open');document.querySelector('.sidebar-overlay').classList.toggle('open');}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>').replace(/&lt;pre&gt;/g,'<pre>').replace(/&lt;\/pre&gt;/g,'</pre>').replace(/&lt;table class='exam-table'&gt;/g,"<table class='exam-table'>").replace(/&lt;\/table&gt;/g,'</table>').replace(/&lt;tr&gt;/g,'<tr>').replace(/&lt;\/tr&gt;/g,'</tr>').replace(/&lt;th&gt;/g,'<th>').replace(/&lt;\/th&gt;/g,'</th>').replace(/&lt;td&gt;/g,'<td>').replace(/&lt;\/td&gt;/g,'</td>').replace(/&lt;img/g,'<img').replace(/&lt;br\s*\/?&gt;/g,'<br>').replace(/&lt;div/g,'<div').replace(/&lt;\/div&gt;/g,'</div>').replace(/&lt;svg/g,'<svg').replace(/&lt;\/svg&gt;/g,'</svg>').replace(/&lt;circle/g,'<circle').replace(/&lt;line/g,'<line').replace(/&lt;text/g,'<text').replace(/&lt;defs/g,'<defs').replace(/&lt;marker/g,'<marker').replace(/&lt;polygon/g,'<polygon').replace(/&lt;polyline/g,'<polyline');}
function hlPython(s){return s.replace(/(#[^\n]*)/g,'<span class="cm">$1</span>').replace(/\b(def|class|if|elif|else|while|for|in|return|import|from|None|True|False|and|or|not|is|lambda|try|except|finally|with|as|pass|break|continue|yield|global|nonlocal|assert|del|raise)\b/g,'<span class="kw">$1</span>').replace(/\b(print|len|range|int|str|float|list|dict|set|tuple|input|open|self|append|pop|extend|remove|insert|index|count|sort|reverse|split|join|strip|replace|find|format|enumerate|zip|map|filter|super|__init__|__str__|__repr__)\b/g,'<span class="fn">$1</span>').replace(/(&quot;[^&]*?&quot;|&#39;[^&]*?&#39;)/g,'<span class="st">$1</span>');}
function totCh(c){const d=courseData[c];return(d.mc?d.mc.length:0)+(d.tf?d.tf.length:0)+(d.fill?d.fill.length:0)+(d.code?d.code.length:0);}
function doneCh(c){const a=A[c];if(!a)return 0;let d=0;for(let k in a.mc)if(a.mc[k])d++;for(let k in a.tf)if(a.tf[k])d++;for(let k in a.fill)if(a.fill[k])d++;for(let k in a.sa)if(a.sa[k])d++;for(let k in a.code)if(a.code[k])d++;return d;}
function render(){
  const m=document.getElementById('main');
  const ch=courseData[cur];if(!ch)return;
  const t=totCh(cur),d=doneCh(cur),p=t?Math.round(d/t*100):0;
  let h=`<div class="chapter-header"><h2 class="chapter-title">${ch.title}</h2><div class="chapter-focus">${ch.focus}</div></div>`;
  h+=`<div class="progress-wrap"><div class="progress-meta"><span class="progress-label">完成进度</span><span class="progress-pct">${d} / ${t}（${p}%）</span></div><div class="progress-track"><div class="progress-fill" style="width:${p}%"></div></div></div>`;
  const show=(type)=>!curType||curType===type;
  const L='ABCD';
  if(ch.mc&&ch.mc.length&&show('mc')){
    h+=`<div class="type-header" id="sec-mc"><span class="type-badge mc">选择题</span><span class="type-title">共 ${ch.mc.length} 题</span></div>`;
    ch.mc.forEach((q,i)=>{
      const isL=A[cur]._lmc.includes(i);
      h+=`<div class="q-card" id="mc-${i}"><div class="q-body"><div class="q-stem"><span class="q-num">${i+1}</span><span>${esc(q.q)}${isL?' <span class="tag-longest">答案最长</span>':''}</span></div><div class="options">`;
      q.o.forEach((o,oi)=>{const s=o.replace(/^[A-Da-d][.、]\s*/,'');h+=`<div class="opt" data-idx="${i}" data-val="${oi}" onclick="pickMC(${i},${oi})"><span class="opt-dot"></span><span class="opt-label"><b>${L[oi]}</b>${esc(s)}</span></div>`;});
      h+=`</div></div></div>`;
    });
  }
  if(ch.tf&&ch.tf.length&&show('tf')){
    h+=`<div class="type-header" id="sec-tf"><span class="type-badge tf">判断题</span><span class="type-title">共 ${ch.tf.length} 题</span></div>`;
    ch.tf.forEach((q,i)=>{
      h+=`<div class="q-card" id="tf-${i}"><div class="q-body"><div class="q-stem"><span class="q-num">${i+1}</span><span>${esc(q.q)}</span></div><div class="tf-group">`;
      h+=`<button class="tf-btn" data-idx="${i}" data-val="true" onclick="pickTF(${i},true)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>正确</button>`;
      h+=`<button class="tf-btn" data-idx="${i}" data-val="false" onclick="pickTF(${i},false)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>错误</button>`;
      h+=`</div><div class="ans-box" id="tf-ans-${i}"></div></div></div>`;
    });
  }
  if(ch.fill&&ch.fill.length&&show('fill')){
    h+=`<div class="type-header" id="sec-fill"><span class="type-badge fill">填空题</span><span class="type-title">共 ${ch.fill.length} 题</span></div>`;
    ch.fill.forEach((q,i)=>{
      h+=`<div class="q-card" id="fl-${i}"><div class="q-body"><div class="q-stem"><span class="q-num">${i+1}</span><span>${esc(q.q)}</span></div><textarea class="sa-area" placeholder="输入你的答案..."></textarea><button class="btn btn-ghost btn-sm" style="margin-top:10px" onclick="showOneAns('fill',${i})">查看答案</button><div class="ans-box" id="fl-ans-${i}"></div></div></div>`;
    });
  }
  if(ch.qa&&ch.qa.length&&show('qa')){
    h+=`<div class="type-header" id="sec-qa"><span class="type-badge qa">问答题</span><span class="type-title">共 ${ch.qa.length} 题</span></div>`;
    ch.qa.forEach((q,i)=>{
      h+=`<div class="q-card" id="qa-${i}"><div class="q-body"><div class="q-stem"><span class="q-num">${i+1}</span><span>${esc(q.q)}</span></div><textarea class="sa-area" placeholder="输入你的答案..."></textarea><button class="btn btn-ghost btn-sm" style="margin-top:10px" onclick="showOneAns('qa',${i})">查看答案</button><div class="ans-box" id="qa-ans-${i}"></div></div></div>`;
    });
  }
  if(ch.essay&&ch.essay.length&&show('essay')){
    h+=`<div class="type-header" id="sec-essay"><span class="type-badge essay">论述题</span><span class="type-title">共 ${ch.essay.length} 题</span></div>`;
    ch.essay.forEach((q,i)=>{
      h+=`<div class="q-card" id="es-${i}"><div class="q-body"><div class="q-stem"><span class="q-num">${i+1}</span><span>${esc(q.q)}</span></div><textarea class="sa-area" placeholder="输入你的答案..."></textarea><button class="btn btn-ghost btn-sm" style="margin-top:10px" onclick="showOneAns('essay',${i})">查看答案</button><div class="ans-box" id="es-ans-${i}"></div></div></div>`;
    });
  }
  if(ch.sa&&ch.sa.length&&show('sa')){
    h+=`<div class="type-header" id="sec-sa"><span class="type-badge sa">简答题</span><span class="type-title">共 ${ch.sa.length} 题</span></div>`;
    ch.sa.forEach((q,i)=>{
      h+=`<div class="q-card" id="sa-${i}"><div class="q-body"><div class="q-stem"><span class="q-num">${i+1}</span><span>${esc(q.q)}</span></div><textarea class="sa-area" placeholder="输入你的答案..."></textarea><button class="btn btn-ghost btn-sm" style="margin-top:10px" onclick="showOneAns('sa',${i})">查看答案</button><div class="ans-box" id="sa-ans-${i}"></div></div></div>`;
    });
  }
  if(ch.code&&ch.code.length&&show('code')){
    h+=`<div class="type-header" id="sec-code"><span class="type-badge code">代码题</span><span class="type-title">共 ${ch.code.length} 题</span></div>`;
    ch.code.forEach((q,i)=>{
      let qHtml=esc(q.q).replace(/&lt;pre&gt;([\s\S]*?)&lt;\/pre&gt;/g,(m,code)=>'<pre>'+hlPython(code)+'</pre>');
      h+=`<div class="q-card" id="code-${i}"><div class="q-body"><div class="q-stem"><span class="q-num">${i+1}</span><span>${qHtml}</span></div><textarea class="sa-area" placeholder="输入你的代码/答案..."></textarea><button class="btn btn-ghost btn-sm" style="margin-top:10px" onclick="showOneAns('code',${i})">查看答案</button><div class="ans-box" id="code-ans-${i}"></div></div></div>`;
    });
  }
  if(ch.note&&ch.note.length&&show('note')){
    h+=`<div class="type-header" id="sec-note"><span class="type-badge note">知识点</span><span class="type-title">共 ${ch.note.length} 节</span></div>`;
    ch.note.forEach((q,i)=>{
      h+=`<div class="q-card"><div class="q-body"><div class="note-h">${esc(q.h)}</div><div class="note-c">${q.c}</div></div></div>`;
    });
  }
  if(show('longest')&&ch.mc){
    const lmc=A[cur]._lmc;
    if(lmc.length){
      h+=`<div class="type-header" id="sec-longest"><span class="type-badge longest">答案最长</span><span class="type-title">共 ${lmc.length} 题（答案文本最长且正确）</span></div>`;
      lmc.forEach(i=>{
        const q=ch.mc[i];
        h+=`<div class="q-card" id="mc-${i}"><div class="q-body"><div class="q-stem"><span class="q-num">${i+1}</span><span>${esc(q.q)}</span></div><div class="options">`;
        q.o.forEach((o,oi)=>{const s=o.replace(/^[A-Da-d][.、]\s*/,'');h+=`<div class="opt" data-idx="${i}" data-val="${oi}" onclick="pickMC(${i},${oi})"><span class="opt-dot"></span><span class="opt-label"><b>${L[oi]}</b>${esc(s)}</span></div>`;});
        h+=`</div></div></div>`;
      });
      }}
  m.innerHTML=h;
  renderMath();
}
function pickMC(idx,val){
  if(A[cur].mc[idx])return;A[cur].mc[idx]=true;
  const q=courseData[cur].mc[idx],isRight=val===q.a;
  const card=document.getElementById(`mc-${idx}`);
  card.querySelectorAll('.opt').forEach(o=>{
    const v=parseInt(o.dataset.val);o.style.pointerEvents='none';
    if(v===q.a){o.classList.add('correct');o.querySelector('.opt-dot').innerHTML=SVG.check;}
    else if(v===val&&!isRight){o.classList.add('wrong');o.querySelector('.opt-dot').innerHTML=SVG.cross;}
  });
  updateProgress();
}
function pickTF(idx,val){
  if(A[cur].tf[idx])return;A[cur].tf[idx]=true;
  const q=courseData[cur].tf[idx],isRight=val===q.a;
  const card=document.getElementById(`tf-${idx}`);
  card.querySelectorAll('.tf-btn').forEach(b=>{
    b.style.pointerEvents='none';const bv=b.dataset.val==='true';
    if(bv===q.a)b.classList.add('correct');
    else if(bv===val&&!isRight)b.classList.add('wrong');
  });
  const box=document.getElementById(`tf-ans-${idx}`);
  box.className='ans-box show '+(isRight?'ok':'fail');
  box.innerHTML=`<div class="ans-title">${isRight?SVG.check:SVG.cross} ${isRight?'正确':'错误'}</div>${isRight?'':'你的答案：'+(val?'正确':'错误')+'　'}正确答案：${q.a?'正确':'错误'}`;
  updateProgress();
}
function updateProgress(){
  const ch=courseData[cur];if(!ch)return;
  const t=totCh(cur),d=doneCh(cur),p=t?Math.round(d/t*100):0;
  const fill=document.querySelector('.progress-fill'),pct=document.querySelector('.progress-pct');
  if(fill)fill.style.width=p+'%';if(pct)pct.textContent=`${d} / ${t}（${p}%）`;
}
function submitAll(){
  const ch=courseData[cur];if(!ch)return;
  let ok=0,tot=0;
  const L='ABCD';
  if(ch.mc)ch.mc.forEach((q,i)=>{
    tot++;
    if(A[cur].mc[i])ok++;
    else{
      const card=document.getElementById(`mc-${i}`);
      if(card)card.querySelectorAll('.opt').forEach(o=>{o.style.pointerEvents='none';const v=parseInt(o.dataset.val);if(v===q.a){o.classList.add('correct');o.querySelector('.opt-dot').innerHTML=SVG.check;}});
      A[cur].mc[i]=true;
    }
  });
  if(ch.tf)ch.tf.forEach((q,i)=>{
    tot++;
    if(A[cur].tf[i])ok++;
    else{
      const card=document.getElementById(`tf-${i}`);
      if(card)card.querySelectorAll('.tf-btn').forEach(b=>{b.style.pointerEvents='none';if((b.dataset.val==='true')===q.a)b.classList.add('correct');});
      const box=document.getElementById(`tf-ans-${i}`);
      if(box){box.className='ans-box show fail';box.innerHTML=`<div class="ans-title">${SVG.cross} 未作答</div>正确答案：${q.a?'正确':'错误'}`;}
      A[cur].tf[i]=true;
    }
  });
  if(ch.fill)ch.fill.forEach((q,i)=>{
    tot++;
    if(!A[cur].fill[i])A[cur].fill[i]=true;
    const box=document.getElementById(`fl-ans-${i}`);
    if(box){box.className='ans-box show reveal';box.innerHTML=`<div class="ans-title">${SVG.eye} 参考答案</div>${esc(q.a)}`;}
  });
  document.getElementById('modal-title').textContent='批改完成';
  document.getElementById('modal-body').textContent=`正确 ${ok} / ${tot} 题（${tot?Math.round(ok/tot*100):0}%）`;
  document.getElementById('modal').classList.add('open');
  updateProgress();
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function showOneAns(type,idx){
  const ch=courseData[cur];let q,ansId;
  if(type==='fill'){q=ch.fill[idx];ansId=`fl-ans-${idx}`;}
  if(type==='qa'){q=ch.qa[idx];ansId=`qa-ans-${idx}`;}
  if(type==='essay'){q=ch.essay[idx];ansId=`es-ans-${idx}`;}
  if(type==='sa'){q=ch.sa[idx];ansId=`sa-ans-${idx}`;}
  if(type==='code'){q=ch.code[idx];ansId=`code-ans-${idx}`;}
  if(!q)return;
  const box=document.getElementById(ansId);
  if(box.classList.contains('show')){box.className='ans-box';return;}
  box.className='ans-box show reveal';
  let ansHtml=q.a.replace(/\n/g,'<br>');
  if(type==='code')ansHtml=hlPython(ansHtml);
  box.innerHTML=`<div class="ans-title">${SVG.eye} 参考答案</div>${ansHtml}`;
  renderMath();
}
function resetAll(){if(!confirm('确定要重置所有答题记录吗？'))return;initA();buildSidebar();render();}
function renderMath(){
  var el=document.getElementById('main');
  if(typeof renderMathInElement!=='function'){
    setTimeout(renderMath,200);return;
  }
  renderMathInElement(el,{
    delimiters:[
      {left:"$$",right:"$$",display:true},
      {left:"$",right:"$",display:false},
      {left:"\\(",right:"\\)",display:false},
      {left:"\\[",right:"\\]",display:true}
    ],
    throwOnError:false
  });
}
document.addEventListener('DOMContentLoaded',function(){enterCourse('os');});
</script>
